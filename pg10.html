<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style10.css">
</head>
<body>

    <div class="page-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-times close-btn" onclick="history.back()"></i>
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="auth-box">
                    <span>Sign in</span> <span class="pipe">|</span> <span>Register</span>
                </div>
            </div>

            <ul class="nav-links">
                <li><i class="fas fa-home"></i> Home</li>
                <li><i class="fas fa-th-list"></i> Categories</li>
                <li><i class="far fa-heart"></i> Favorites</li>
                <li><i class="fas fa-archive"></i> My orders</li>
            </ul>

            <div class="hr-line"></div>

            <ul class="nav-links">
                <li><i class="fas fa-globe"></i> English | USD</li>
                <li><i class="fas fa-headset"></i> Contact us</li>
                <li><i class="fas fa-building"></i> About</li>
            </ul>

            <div class="hr-line"></div>

            <ul class="legal-links">
                <li>User agreement</li>
                <li>Partnership</li>
                <li>Privacy policy</li>
            </ul>
        </aside>

        <div class="overlay" onclick="history.back()"></div>
    </div>

</body>
</html>
